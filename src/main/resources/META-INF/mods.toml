modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"
issueTrackerURL = "https://github.com/alRex-U/ParCool/issues"
[[mods]]
modId = "parcool" #mandatory
version = "${mod_version}" #mandatory
displayName = "ParCool!" #mandatory
displayURL = "https://www.curseforge.com/minecraft/mc-mods/parcool" #optional
logoFile = "parcool_logo.png" #optional
# credits = "" #optional
authors = "${mod_authors}"
description = '''
    This enable us act like parkour players.
    Enjoy Minecraft with cool actions!
    If Patchouli mod is installed, let's read ParCool Guide!
'''
[[dependencies.parcool]] #optional
modId = "forge" #mandatory
mandatory = true #mandatory
versionRange = "[43,)" #mandatory
ordering = "NONE"
side = "BOTH"

[[dependencies.parcool]]
modId = "minecraft"
mandatory = true
# This version range declares a minimum of the current minecraft version up to but not including the next major version
versionRange = "[1.19.2,1.20)"
ordering = "NONE"
side = "BOTH"

# Feathers
[[dependencies.parcool]]
modId = "${extern_feathers.mod_id}"
mandatory = false
versionRange = "${extern_feathers.version_range}"
ordering = "BEFORE"
side = "BOTH"

# Better Third Person
[[dependencies.parcool]]
modId = "${extern_betterthirdperson.mod_id}"
mandatory = false
versionRange = "${extern_betterthirdperson.version_range}"
ordering = "NONE"
side = "BOTH"

# Shoulder Surfing
[[dependencies.parcool]]
